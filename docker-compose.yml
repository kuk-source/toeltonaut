services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-toeltonaut}
      POSTGRES_USER: ${POSTGRES_USER:-toeltonaut}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toeltonaut-dev}
    volumes:
      - toeltonaut_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toeltonaut}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    ports:
      - "8000:8000"
    volumes:
      - toeltonaut_data:/data
      - ./backend/config.yaml:/app/config.yaml:ro
      - ./docs:/app/docs:ro
    environment:
      - UPLOADS_DIR=/data/uploads
      - OUTPUTS_DIR=/data/outputs
      - MODELS_DIR=/data/models
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-toeltonaut}:${POSTGRES_PASSWORD:-toeltonaut-dev}@db:5432/${POSTGRES_DB:-toeltonaut}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VITE_API_TARGET=http://host.docker.internal:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  toeltonaut_data:
  toeltonaut_pg:
