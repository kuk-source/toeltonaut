ai:
  # v0.1        = YOLOv8 BBox + proportionale Keypoints (kein Modell-Download)
  # v0.2-rtmpose = ONNX-Runtime HRNet-W32 Horse-10 (kein mmcv nötig, ~1.4× schneller)
  # v0.2-mmpose  = MMPose hrnet_w32_horse10 (22 KP, mAP ~88) – Fallback
  model_version: "v0.2-rtmpose"

  model_path: "yolov8n.pt"  # YOLO detection model

  pose_model: "/app/models/horse10_hrnet_w32.onnx"
  pose_config: "/app/models/horse10_hrnet_w32_1x.py"  # nur für v0.2-mmpose Fallback

  device: "cpu"                  # cpu only (GTX 1070 sm_61 inkompatibel mit PyTorch 2.1+)
  yolo_conf: 0.3
  yolo_imgsz: 640
  vid_stride: 2
  max_output_width: 1920

upload:
  ttl_hours: 0    # 0 = sofort löschen nach Verarbeitung; >0 = Stunden behalten (Re-Analyse)

output:
  ttl_hours: 24

database:
  pool_size: 5
